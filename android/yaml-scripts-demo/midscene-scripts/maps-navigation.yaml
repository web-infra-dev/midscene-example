android:
  # launch: https://www.ebay.com
  deviceId: s4ey59ytbitot4yp
  # Disable auto keyboard dismiss to avoid ESCAPE/BACK key side-effects in WebView / Mobile web pages
  # See: https://midscenejs.com/android-getting-started.html#text-input-is-cleared-or-lost-after-typing
  autoDismissKeyboard: false

tasks:
  - name: travel
    flow:
      - aiAct: open Maps app
      - aiAct: input 'attractions' in the search bar, and click the search button
      - aiAct: click the first search result, enter the attraction details page
      - aiAct: click "Directions" button, enter the route planning page
      - aiAct: click "Start" button to start navigation
